{% macro render_field(field) %}
  {{ field.label }}{% if field.flags.required %} <span style="color:red;">*</span>{% endif %}
  {{ field(**kwargs)|safe }}
  {% if field.errors %}
    {% for error in field.errors %}
      <span class="help-inline">{{error}}</span>
    {% endfor %}
  {% endif %}
{% endmacro %}

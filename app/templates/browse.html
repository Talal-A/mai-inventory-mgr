{% extends "base.html" %}
{% block body %}
<h4>Browse Inventory</h4>
<p class="text-muted">Browse all items in the inventory</p>

<!-- Search Bar -->
<div class="row mb-3">
  <div class="col-12">
    <input type="text" class="form-control" id="searchInput" placeholder="Search by name, location, or notes...">
  </div>
</div>

<!-- Filter Controls -->
<div class="row mb-3">
  <div class="col-md-3 mb-2">
    <label for="categoryFilter">Category</label>
    <select class="form-control" id="categoryFilter">
      <option value="">All Categories</option>
      {% for category in categories %}
      <option value="{{category.id}}">{{category.name}}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-3 mb-2">
    <label for="subcategoryFilter">Subcategory</label>
    <select class="form-control" id="subcategoryFilter" disabled>
      <option value="">All Subcategories</option>
    </select>
  </div>
  <div class="col-md-2 mb-2">
    <label for="sortBy">Sort By</label>
    <select class="form-control" id="sortBy">
      <option value="name">Name</option>
      <option value="category">Category</option>
      <option value="quantity">Quantity</option>
    </select>
  </div>
  <div class="col-md-2 mb-2">
    <label for="sortOrder">Order</label>
    <select class="form-control" id="sortOrder">
      <option value="asc">Ascending</option>
      <option value="desc">Descending</option>
    </select>
  </div>
  <div class="col-md-2 mb-2">
    <label>&nbsp;</label>
    <div class="form-check mt-1">
      <input class="form-check-input" type="checkbox" id="hideOutOfStock">
      <label class="form-check-label" for="hideOutOfStock">Hide out of stock</label>
    </div>
  </div>
</div>

<!-- Results Info and View Toggle -->
<div class="row mb-3">
  <div class="col-12 d-flex justify-content-between align-items-center">
    <div>
      <span id="resultsInfo" class="text-muted">Loading items...</span>
      <button type="button" class="btn btn-sm btn-outline-secondary ml-2" id="clearFilters">
        <i class="material-icons" style="font-size:16px;vertical-align:middle;">clear_all</i> Clear Filters
      </button>
    </div>
    <div class="btn-group btn-group-sm" role="group">
      <button type="button" class="btn btn-primary" id="tileViewBtn" title="Tile View">
        <i class="material-icons" style="font-size:18px;vertical-align:middle;">view_module</i>
      </button>
      <button type="button" class="btn btn-outline-primary" id="tableViewBtn" title="Table View">
        <i class="material-icons" style="font-size:18px;vertical-align:middle;">view_list</i>
      </button>
    </div>
  </div>
</div>

<!-- Tile View -->
<div id="tileView" class="row"></div>

<!-- Table View -->
<div id="tableView" style="display:none;">
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th></th>
          <th>Item</th>
          <th>Category</th>
          <th>Subcategory</th>
          <th>Qty</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Loading Indicator -->
<div id="loadingIndicator" class="text-center py-4" style="display:none;">
  <div class="spinner-border" role="status">
    <span class="sr-only">Loading...</span>
  </div>
  <p class="mt-2 text-muted">Loading items...</p>
</div>

<!-- No Results -->
<div id="noResults" class="text-center py-5" style="display:none;">
  <i class="material-icons" style="font-size:4rem;color:#ccc;">search_off</i>
  <h5 class="mt-3">No items found</h5>
  <p class="text-muted">Try adjusting your search or filters.</p>
</div>

<!-- Image Lightbox Modal -->
<div id="lightbox" style="display:none;">
  <div id="lightbox-backdrop"></div>
  <button id="lightbox-close">&times;</button>
  <button id="lightbox-prev"><i class="material-icons">chevron_left</i></button>
  <button id="lightbox-next"><i class="material-icons">chevron_right</i></button>
  <div id="lightbox-img-wrap">
    <img id="lightbox-img" src="">
  </div>
  <div id="lightbox-counter"></div>
</div>

<style>
  .supply-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    height: 100%;
  }
  .supply-card-link:hover {
    text-decoration: none;
    color: inherit;
  }
  .supply-card {
    background: white;
    border: 1px solid #dee2e6;
    border-radius: 0.5rem;
    transition: box-shadow 0.2s ease;
    cursor: pointer;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 1rem;
  }
  .supply-card:hover {
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .card-image-container {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .card-image {
    max-width: 120px;
    max-height: 120px;
    object-fit: contain;
    border-radius: 0.25rem;
  }
  .placeholder-image {
    width: 120px;
    height: 120px;
    background-color: #f8f9fa;
    border-radius: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6c757d;
  }
  .supply-card .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #212529;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .supply-card .card-category {
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 0.5rem;
  }
  .supply-card .card-location {
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 0.75rem;
  }
  .quantity-display {
    font-size: 1.8rem;
    font-weight: bold;
    color: #007bff;
    margin-bottom: 0.5rem;
  }
  .quantity-unit {
    font-size: 0.85rem;
    color: #6c757d;
    font-weight: normal;
  }
  .card-image-container.has-image {
    cursor: pointer;
    position: relative;
  }
  .card-image-container.has-image::after {
    content: 'zoom_in';
    font-family: 'Material Icons';
    position: absolute;
    font-size: 2rem;
    color: #fff;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .card-image-container.has-image:hover::after {
    opacity: 1;
  }
  .table-image-clickable {
    cursor: pointer;
  }
  .table-image-clickable:hover {
    opacity: 0.8;
  }
  #lightbox {
    position: fixed;
    inset: 0;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #lightbox-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
  }
  #lightbox-close {
    position: absolute;
    top: 16px;
    right: 24px;
    z-index: 10002;
    background: none;
    border: none;
    color: #fff;
    font-size: 2.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px 12px;
    opacity: 0.8;
  }
  #lightbox-close:hover { opacity: 1; }
  #lightbox-prev, #lightbox-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10002;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    cursor: pointer;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
  }
  #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; background: rgba(255,255,255,0.3); }
  #lightbox-prev { left: 20px; }
  #lightbox-next { right: 20px; }
  #lightbox-prev .material-icons, #lightbox-next .material-icons { font-size: 2rem; }
  #lightbox-img-wrap {
    position: relative;
    z-index: 10001;
    max-width: 90vw;
    max-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #lightbox-img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  #lightbox-counter {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10002;
    color: #fff;
    font-size: 0.9rem;
    opacity: 0.7;
  }
  @media (max-width: 768px) {
    .supply-card { margin-bottom: 15px; }
    #lightbox-prev { left: 8px; }
    #lightbox-next { right: 8px; }
  }
</style>

<script>
  // Subcategories data from server
  var subcategoriesByCategory = {{ subcategories_by_category | tojson }};

  var currentPage = 0;
  var pageSize = 24;
  var isLoading = false;
  var hasMore = true;
  var currentView = 'tile';
  var loadedItems = [];
  var searchTimeout = null;

  // URL parameter management
  function buildQueryParams() {
    var params = new URLSearchParams();
    params.set('page', currentPage);
    params.set('page_size', pageSize);

    var search = document.getElementById('searchInput').value.trim();
    if (search) params.set('search', search);

    var category = document.getElementById('categoryFilter').value;
    if (category) params.set('category', category);

    var subcategory = document.getElementById('subcategoryFilter').value;
    if (subcategory) params.set('subcategory', subcategory);

    params.set('sort_by', document.getElementById('sortBy').value);
    params.set('sort_order', document.getElementById('sortOrder').value);

    if (document.getElementById('hideOutOfStock').checked) {
      params.set('hide_out_of_stock', '1');
    }

    return params;
  }

  function updateURLParams() {
    var url = new URL(window.location);
    url.search = '';

    var search = document.getElementById('searchInput').value.trim();
    if (search) url.searchParams.set('search', search);

    var category = document.getElementById('categoryFilter').value;
    if (category) url.searchParams.set('category', category);

    var subcategory = document.getElementById('subcategoryFilter').value;
    if (subcategory) url.searchParams.set('subcategory', subcategory);

    var sortBy = document.getElementById('sortBy').value;
    if (sortBy !== 'name') url.searchParams.set('sort_by', sortBy);

    var sortOrder = document.getElementById('sortOrder').value;
    if (sortOrder !== 'asc') url.searchParams.set('sort_order', sortOrder);

    if (document.getElementById('hideOutOfStock').checked) {
      url.searchParams.set('hide_out_of_stock', '1');
    }

    window.history.replaceState({}, '', url);
  }

  function initFromURL() {
    var urlParams = new URLSearchParams(window.location.search);

    if (urlParams.get('search')) document.getElementById('searchInput').value = urlParams.get('search');
    if (urlParams.get('category')) {
      document.getElementById('categoryFilter').value = urlParams.get('category');
      updateSubcategories(urlParams.get('category'));
    }
    if (urlParams.get('subcategory')) document.getElementById('subcategoryFilter').value = urlParams.get('subcategory');
    if (urlParams.get('sort_by')) document.getElementById('sortBy').value = urlParams.get('sort_by');
    if (urlParams.get('sort_order')) document.getElementById('sortOrder').value = urlParams.get('sort_order');
    if (urlParams.get('hide_out_of_stock') === '1') document.getElementById('hideOutOfStock').checked = true;
  }

  // Subcategory dropdown update
  function updateSubcategories(categoryId) {
    var select = document.getElementById('subcategoryFilter');
    select.innerHTML = '<option value="">All Subcategories</option>';

    if (categoryId && subcategoriesByCategory[categoryId]) {
      var subs = subcategoriesByCategory[categoryId];
      for (var i = 0; i < subs.length; i++) {
        var opt = document.createElement('option');
        opt.value = subs[i].id;
        opt.textContent = subs[i].name;
        select.appendChild(opt);
      }
      select.disabled = false;
    } else {
      select.disabled = !categoryId;
    }
  }

  // Fetch items from API
  function fetchItems(reset) {
    if (isLoading) return;

    if (reset) {
      currentPage = 0;
      hasMore = true;
      loadedItems = [];
      document.getElementById('tileView').innerHTML = '';
      document.getElementById('tableBody').innerHTML = '';
    }

    if (!hasMore) return;

    isLoading = true;
    document.getElementById('loadingIndicator').style.display = '';
    document.getElementById('noResults').style.display = 'none';

    var params = buildQueryParams();

    fetch('/api/browse?' + params.toString())
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (reset) {
          updateResultsInfo(data.total_count);
          updateURLParams();
        }

        if (data.items.length === 0 && currentPage === 0) {
          document.getElementById('noResults').style.display = '';
        } else {
          loadedItems = loadedItems.concat(data.items);
          if (currentView === 'tile') {
            renderTileItems(data.items);
          } else {
            renderTableItems(data.items);
          }
        }

        currentPage = data.page + 1;
        hasMore = data.has_more;
        isLoading = false;
        document.getElementById('loadingIndicator').style.display = 'none';
      })
      .catch(function(error) {
        console.error('Error loading items:', error);
        isLoading = false;
        document.getElementById('loadingIndicator').style.display = 'none';
      });
  }

  function updateResultsInfo(totalCount) {
    var plural = totalCount === 1 ? 'item' : 'items';
    document.getElementById('resultsInfo').textContent = 'Showing ' + totalCount + ' ' + plural;
  }

  // Render functions
  function renderTileItems(items) {
    var container = document.getElementById('tileView');
    for (var i = 0; i < items.length; i++) {
      container.insertAdjacentHTML('beforeend', createItemTile(items[i]));
    }
  }

  function renderTableItems(items) {
    var tbody = document.getElementById('tableBody');
    for (var i = 0; i < items.length; i++) {
      tbody.insertAdjacentHTML('beforeend', createTableRow(items[i]));
    }
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function createItemTile(item) {
    var hasImage = !!item.image_url;
    var imageContainerClass = 'card-image-container' + (hasImage ? ' has-image' : '');
    var imageOnClick = hasImage ? ' onclick="openLightbox(\'' + escapeHtml(item.id) + '\', \'' + escapeHtml(item.image_url) + '\'); event.preventDefault(); event.stopPropagation();"' : '';
    var imageHtml = hasImage
      ? '<img src="' + escapeHtml(item.image_url) + '" alt="' + escapeHtml(item.name) + '" class="card-image" onerror="this.parentNode.innerHTML=\'<div class=placeholder-image><i class=material-icons style=font-size:3rem>inventory_2</i></div>\'; this.parentNode.className=\'card-image-container\'; this.parentNode.removeAttribute(\'onclick\');">'
      : '<div class="placeholder-image"><i class="material-icons" style="font-size:3rem;">inventory_2</i></div>';

    var categoryText = escapeHtml(item.category_name);
    if (item.subcategory_name) {
      categoryText += ' / ' + escapeHtml(item.subcategory_name);
    }

    return '<div class="col-lg-4 col-md-6 col-sm-12 mb-4">' +
      '<a href="/view/item/' + escapeHtml(item.id) + '" class="supply-card-link">' +
        '<div class="supply-card">' +
          '<div class="' + imageContainerClass + '"' + imageOnClick + '>' + imageHtml + '</div>' +
          '<div class="card-title">' + escapeHtml(item.name) + '</div>' +
          '<div class="card-category">' + categoryText + '</div>' +
          '<div class="quantity-display">' + item.quantity_active + ' <span class="quantity-unit">in stock</span></div>' +
        '</div>' +
      '</a>' +
    '</div>';
  }

  function createTableRow(item) {
    var hasImage = !!item.image_url;
    var imageOnClick = hasImage ? ' class="table-image-clickable" onclick="openLightbox(\'' + escapeHtml(item.id) + '\', \'' + escapeHtml(item.image_url) + '\'); event.stopPropagation();"' : '';
    var imageHtml = hasImage
      ? '<img src="' + escapeHtml(item.image_url) + '" alt="' + escapeHtml(item.name) + '" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" onerror="this.outerHTML=\'<i class=material-icons style=font-size:24px;color:#6c757d>image</i>\'">'
      : '<i class="material-icons" style="font-size:24px;color:#6c757d;">image</i>';

    return '<tr>' +
      '<td' + imageOnClick + '>' + imageHtml + '</td>' +
      '<td><strong>' + escapeHtml(item.name) + '</strong></td>' +
      '<td>' + escapeHtml(item.category_name) + '</td>' +
      '<td>' + escapeHtml(item.subcategory_name || '-') + '</td>' +
      '<td>' +
        '<span class="badge badge-' + (item.quantity_active > 0 ? 'success' : 'secondary') + '">' + item.quantity_active + '</span>' +
      '</td>' +
      '<td>' +
        '<a href="/view/item/' + escapeHtml(item.id) + '" class="btn btn-sm btn-outline-primary">' +
          '<i class="material-icons" style="font-size:16px;vertical-align:middle;">visibility</i>' +
        '</a>' +
      '</td>' +
    '</tr>';
  }

  // Lightbox
  var lightboxImages = [];
  var lightboxIndex = 0;

  function openLightbox(itemId, firstImageUrl) {
    var lb = document.getElementById('lightbox');
    var img = document.getElementById('lightbox-img');
    img.src = firstImageUrl;
    lightboxImages = [firstImageUrl];
    lightboxIndex = 0;
    updateLightboxNav();
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    fetch('/api/item/' + itemId + '/images')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.images && data.images.length > 0) {
          lightboxImages = data.images;
          lightboxIndex = 0;
          updateLightboxNav();
        }
      });
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }

  function lightboxNav(dir) {
    if (lightboxImages.length <= 1) return;
    lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
    document.getElementById('lightbox-img').src = lightboxImages[lightboxIndex];
    updateLightboxNav();
  }

  function updateLightboxNav() {
    var hasMultiple = lightboxImages.length > 1;
    document.getElementById('lightbox-prev').style.display = hasMultiple ? '' : 'none';
    document.getElementById('lightbox-next').style.display = hasMultiple ? '' : 'none';
    document.getElementById('lightbox-counter').textContent = hasMultiple
      ? (lightboxIndex + 1) + ' / ' + lightboxImages.length
      : '';
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', function() { lightboxNav(-1); });
  document.getElementById('lightbox-next').addEventListener('click', function() { lightboxNav(1); });
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').style.display === 'none') return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  });

  // View mode toggle
  function setViewMode(mode) {
    currentView = mode;
    if (mode === 'tile') {
      document.getElementById('tileViewBtn').className = 'btn btn-primary';
      document.getElementById('tableViewBtn').className = 'btn btn-outline-primary';
      document.getElementById('tileView').style.display = '';
      document.getElementById('tableView').style.display = 'none';
    } else {
      document.getElementById('tableViewBtn').className = 'btn btn-primary';
      document.getElementById('tileViewBtn').className = 'btn btn-outline-primary';
      document.getElementById('tileView').style.display = 'none';
      document.getElementById('tableView').style.display = '';
    }

    // Re-render loaded items in the new view
    if (loadedItems.length > 0) {
      if (mode === 'tile') {
        document.getElementById('tileView').innerHTML = '';
        renderTileItems(loadedItems);
      } else {
        document.getElementById('tableBody').innerHTML = '';
        renderTableItems(loadedItems);
      }
    }
  }

  // Initialize
  window.onload = function() {
    initFromURL();

    // Search with debounce
    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(function() { fetchItems(true); }, 300);
    });

    // Category filter
    document.getElementById('categoryFilter').addEventListener('change', function() {
      updateSubcategories(this.value);
      document.getElementById('subcategoryFilter').value = '';
      fetchItems(true);
    });

    // Other filters
    document.getElementById('subcategoryFilter').addEventListener('change', function() { fetchItems(true); });
    document.getElementById('sortBy').addEventListener('change', function() { fetchItems(true); });
    document.getElementById('sortOrder').addEventListener('change', function() { fetchItems(true); });
    document.getElementById('hideOutOfStock').addEventListener('change', function() { fetchItems(true); });

    // View toggle
    document.getElementById('tileViewBtn').addEventListener('click', function() { setViewMode('tile'); });
    document.getElementById('tableViewBtn').addEventListener('click', function() { setViewMode('table'); });

    // Clear filters
    document.getElementById('clearFilters').addEventListener('click', function() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('subcategoryFilter').value = '';
      document.getElementById('subcategoryFilter').disabled = true;
      document.getElementById('sortBy').value = 'name';
      document.getElementById('sortOrder').value = 'asc';
      document.getElementById('hideOutOfStock').checked = false;
      fetchItems(true);
    });

    // Infinite scroll
    window.addEventListener('scroll', function() {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
        if (!isLoading && hasMore) {
          fetchItems(false);
        }
      }
    });

    // Initial load
    fetchItems(true);
  };
</script>

{% endblock %}
